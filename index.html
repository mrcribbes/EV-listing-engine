
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ELA — Elite Listing Application</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;0,600;1,200;1,300;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--black:#050505;--gold:#c9a84c;--gold2:#e8d5a3;--gold3:#8a6a1f;--goldDim:rgba(201,168,76,0.06);--goldMid:rgba(201,168,76,0.35);--goldBorder:rgba(201,168,76,0.15);--white:#faf8f2;}
html,body{width:100%;height:100%;background:var(--black);color:var(--white);font-family:'Cormorant Garamond',serif;overflow:hidden;}
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-ring{position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,0.04);top:50%;left:50%;transform:translate(-50%,-50%);animation:expandRing 8s ease-out infinite;}
.bg-ring:nth-child(1){width:200px;height:200px;animation-delay:0s;}
.bg-ring:nth-child(2){width:420px;height:420px;animation-delay:1.6s;}
.bg-ring:nth-child(3){width:680px;height:680px;animation-delay:3.2s;}
.bg-ring:nth-child(4){width:960px;height:960px;animation-delay:4.8s;}
.bg-ring:nth-child(5){width:1280px;height:1280px;animation-delay:6.4s;}
@keyframes expandRing{0%{opacity:0;transform:translate(-50%,-50%) scale(0.85);}20%{opacity:1;}100%{opacity:0;transform:translate(-50%,-50%) scale(1.12);}}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(201,168,76,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.022) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 72% 72% at 50% 50%,black 0%,transparent 100%);}
.scan{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.12),transparent);z-index:1;animation:scanDown 7s linear infinite;}
@keyframes scanDown{0%{top:-2px;}100%{top:100%;}}
.corner{position:fixed;z-index:10;width:44px;height:44px;}
.corner.tl{top:22px;left:22px;border-top:1px solid rgba(201,168,76,0.3);border-left:1px solid rgba(201,168,76,0.3);}
.corner.tr{top:22px;right:22px;border-top:1px solid rgba(201,168,76,0.3);border-right:1px solid rgba(201,168,76,0.3);}
.corner.bl{bottom:22px;left:22px;border-bottom:1px solid rgba(201,168,76,0.3);border-left:1px solid rgba(201,168,76,0.3);}
.corner.br{bottom:22px;right:22px;border-bottom:1px solid rgba(201,168,76,0.3);border-right:1px solid rgba(201,168,76,0.3);}
.top-bar{position:fixed;top:0;left:0;right:0;padding:26px 52px;display:flex;align-items:center;justify-content:space-between;z-index:20;border-bottom:1px solid rgba(201,168,76,0.06);background:linear-gradient(180deg,rgba(5,5,5,0.92) 0%,transparent 100%);}
.ela-mark{display:flex;flex-direction:column;gap:3px;}
.ela-letters{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.44em;color:var(--gold);text-transform:uppercase;}
.ela-sub{font-size:11px;font-style:italic;font-weight:200;color:rgba(201,168,76,0.3);letter-spacing:0.08em;}

/* MAIN */
#main{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}

/* ORB */
#orb-wrap{position:relative;width:260px;height:260px;display:flex;align-items:center;justify-content:center;margin-bottom:40px;}
#orb-svg{position:absolute;width:260px;height:260px;overflow:visible;}
.ring1{fill:none;stroke:rgba(201,168,76,0.1);stroke-width:1;stroke-dasharray:2 12;animation:spin 28s linear infinite;transform-origin:130px 130px;}
.ring2{fill:none;stroke:rgba(201,168,76,0.06);stroke-width:1;stroke-dasharray:1 22;animation:spin 18s linear infinite reverse;transform-origin:130px 130px;}
@keyframes spin{to{transform:rotate(360deg);}}
#orb-path{transition:d 1.4s cubic-bezier(0.34,1.4,0.64,1);}
.td{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:tdP 1.4s ease-in-out infinite;display:inline-block;}
.td:nth-child(1){animation-delay:0s;}.td:nth-child(2){animation-delay:0.2s;}.td:nth-child(3){animation-delay:0.4s;}
@keyframes tdP{0%,100%{opacity:0.2;transform:scale(0.7);}50%{opacity:1;transform:scale(1.2);}}
#orb-dots{position:absolute;display:none;align-items:center;gap:6px;}
#orb-dots.show{display:flex;}

/* STATUS */
#status-area{text-align:center;margin-bottom:32px;}
#greeting{font-size:26px;font-weight:200;font-style:italic;color:var(--gold2);letter-spacing:0.03em;margin-bottom:8px;}
#status-line{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(201,168,76,0.4);transition:all 0.5s;}

/* ADDRESS INPUT */
#address-form{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:560px;padding:0 24px;}
#address-input{
  width:100%;
  background:rgba(201,168,76,0.05);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:0;
  color:var(--white);
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  font-style:italic;
  padding:16px 22px;
  outline:none;
  text-align:center;
  letter-spacing:0.02em;
  transition:border-color 0.25s,background 0.25s;
  -webkit-appearance:none;
}
#address-input:focus{border-color:var(--gold);background:rgba(201,168,76,0.08);}
#address-input::placeholder{color:rgba(250,248,242,0.2);}
#run-btn{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold);
  padding:12px 44px;
  cursor:pointer;
  transition:all 0.2s;
}
#run-btn:hover{background:var(--gold);color:var(--black);}
#run-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* TOAST */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(10,8,2,0.95);border:1px solid var(--goldBorder);padding:11px 22px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);z-index:100;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;}
#toast.show{opacity:1;}

/* BRIEF PANEL */
#brief-panel{position:fixed;inset:0;z-index:60;background:rgba(5,5,5,0.98);display:none;flex-direction:column;opacity:0;transition:opacity 0.5s;}
#brief-panel.open{display:flex;opacity:1;}
.bp-top{background:linear-gradient(135deg,#060503,#0c0902);border-bottom:1px solid var(--goldBorder);padding:26px 48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.bp-ela{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
.bp-addr{font-size:22px;font-weight:200;font-style:italic;}
.bp-acts{display:flex;gap:10px;}
.bp-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;background:transparent;cursor:pointer;padding:8px 18px;transition:all 0.2s;}
.bp-btn.g{border:1px solid var(--gold);color:var(--gold);}
.bp-btn.g:hover{background:var(--gold);color:var(--black);}
.bp-btn.o{border:1px solid var(--goldBorder);color:var(--goldMid);}
.bp-btn.o:hover{border-color:var(--gold);color:var(--gold);}
.stream-bar{height:2px;display:none;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);background-size:300%;animation:sFlow 2s infinite;flex-shrink:0;}
.stream-bar.on{display:block;}
@keyframes sFlow{0%{background-position:0%;}100%{background-position:300%;}}
#brief-scroll{flex:1;overflow-y:auto;padding:50px 60px;scrollbar-width:thin;scrollbar-color:var(--gold3) transparent;}
#brief-text{font-size:15px;line-height:2;color:rgba(250,248,242,0.82);white-space:pre-wrap;word-break:break-word;max-width:860px;margin:0 auto;}
.bp-bottom{border-top:1px solid var(--goldBorder);padding:11px 48px;display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(5,5,5,0.8);}
.bp-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.bp-dot.pulse{animation:tdP 1.5s ease-in-out infinite;}
.bp-status{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(201,168,76,0.4);}
</style>
</head>
<body>
<div class="bg-canvas"><div class="bg-ring"></div><div class="bg-ring"></div><div class="bg-ring"></div><div class="bg-ring"></div><div class="bg-ring"></div></div>
<div class="bg-grid"></div><div class="scan"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div class="top-bar">
  <div class="ela-mark"><div class="ela-letters">E · L · A</div><div class="ela-sub">Elite Listing Application</div></div>
</div>

<div id="main">
  <div id="orb-wrap">
    <svg id="orb-svg" viewBox="0 0 260 260">
      <defs>
        <radialGradient id="og" cx="35%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#f2e4b8"/>
          <stop offset="30%" stop-color="#e8d5a3"/>
          <stop offset="65%" stop-color="#c9a84c"/>
          <stop offset="100%" stop-color="#2a1805"/>
        </radialGradient>
        <radialGradient id="gg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.32"/>
          <stop offset="65%" stop-color="#c9a84c" stop-opacity="0.07"/>
          <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="ig" cx="38%" cy="32%" r="54%">
          <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#fff8e0" stop-opacity="0"/>
        </radialGradient>
        <filter id="gb"><feGaussianBlur stdDeviation="20"/></filter>
        <filter id="sb"><feGaussianBlur stdDeviation="3"/></filter>
      </defs>
      <circle cx="130" cy="130" r="115" fill="url(#gg)" filter="url(#gb)"/>
      <circle class="ring1" cx="130" cy="130" r="122" stroke-dasharray="2 13"/>
      <circle class="ring2" cx="130" cy="130" r="110" stroke-dasharray="1 21"/>
      <g stroke="rgba(201,168,76,0.22)" stroke-width="1.2">
        <line x1="130" y1="5" x2="130" y2="16"/>
        <line x1="130" y1="244" x2="130" y2="255"/>
        <line x1="5" y1="130" x2="16" y2="130"/>
        <line x1="244" y1="130" x2="255" y2="130"/>
        <line x1="36" y1="36" x2="44" y2="44"/>
        <line x1="216" y1="36" x2="224" y2="44"/>
        <line x1="36" y1="224" x2="44" y2="216"/>
        <line x1="216" y1="224" x2="224" y2="216"/>
      </g>
      <path id="orb-path"
        d="M130,45 C178,45 215,82 215,130 C215,178 178,215 130,215 C82,215 45,178 45,130 C45,82 82,45 130,45 Z"
        fill="url(#og)" stroke="rgba(201,168,76,0.48)" stroke-width="0.8"/>
      <path
        d="M130,45 C178,45 215,82 215,130 C215,178 178,215 130,215 C82,215 45,178 45,130 C45,82 82,45 130,45 Z"
        fill="url(#ig)"/>
      <ellipse cx="112" cy="92" rx="22" ry="13" fill="rgba(255,252,230,0.2)" transform="rotate(-28,112,92)" filter="url(#sb)"/>
      <ellipse cx="106" cy="86" rx="9" ry="5" fill="rgba(255,252,230,0.36)" transform="rotate(-28,106,86)"/>
    </svg>
    <div id="orb-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div>
  </div>

  <div id="status-area">
    <div id="greeting"></div>
    <div id="status-line">Enter a property address below</div>
  </div>

  <div id="address-form">
    <input type="text" id="address-input" placeholder="123 Bridger Canyon Rd, Bozeman, MT" autocomplete="off"
      onkeydown="if(event.key==='Enter')submitAddress()"/>
    <button id="run-btn" onclick="submitAddress()">Generate Brief</button>
  </div>
</div>

<div id="toast"></div>

<!-- BRIEF PANEL -->
<div id="brief-panel">
  <div class="bp-top">
    <div>
      <div class="bp-ela">ELA · Elite Listing Application · Mr. Cribbes</div>
      <div class="bp-addr" id="bp-addr">Intelligence Brief</div>
    </div>
    <div class="bp-acts">
      <button class="bp-btn g" onclick="downloadPDF()">Download PDF</button>
      <button class="bp-btn g" onclick="newBrief()">+ New Brief</button>
      <button class="bp-btn o" onclick="closeBrief()">Close</button>
    </div>
  </div>
  <div class="stream-bar" id="stream-bar"></div>
  <div id="brief-scroll"><div id="brief-text"></div></div>
  <div class="bp-bottom">
    <div class="bp-dot" id="bp-dot"></div>
    <div class="bp-status" id="bp-status">Ready</div>
  </div>
</div>

<script>
let currentBrief='',currentAddress='';

// GREETING
const greetEl=document.getElementById('greeting');
const h=new Date().getHours();
greetEl.textContent=h<12?'Good morning, Mr. Cribbes.':h<17?'Good afternoon, Mr. Cribbes.':'Good evening, Mr. Cribbes.';
greetEl.style.cssText='opacity:0;transform:translateY(8px);transition:opacity 1.8s ease 0.5s,transform 1.8s ease 0.5s;';
setTimeout(()=>{greetEl.style.opacity='1';greetEl.style.transform='translateY(0)';},100);

// TOAST
function toast(msg,dur=3200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);}

// ORB PATHS
const P_CIRCLE='M130,45 C178,45 215,82 215,130 C215,178 178,215 130,215 C82,215 45,178 45,130 C45,82 82,45 130,45 Z';
const P_HOME='M130,32 C130,32 139,44 152,56 L215,112 L197,112 L197,198 L163,198 L163,155 L97,155 L97,198 L63,198 L63,112 L45,112 L108,56 C121,44 130,32 130,32 Z';
const P_THINK='M130,40 C180,44 218,80 215,132 C212,182 174,218 130,215 C80,212 42,174 45,130 C48,80 84,36 130,40 Z';
const orbPath=document.getElementById('orb-path');
const orbDots=document.getElementById('orb-dots');
const statusLine=document.getElementById('status-line');
const runBtn=document.getElementById('run-btn');
const addrInput=document.getElementById('address-input');

// BREATHING ANIMATION
let bD=1,bS=1;
setInterval(()=>{
  if(document.getElementById('brief-panel').classList.contains('open'))return;
  if(orbDots.classList.contains('show'))return;
  bS+=bD*0.002;if(bS>1.01)bD=-1;if(bS<0.992)bD=1;
  const r=85*bS,c=130;
  orbPath.setAttribute('d',`M${c},${c-r} C${c+r*0.74},${c-r} ${c+r},${c-r*0.74} ${c+r},${c} C${c+r},${c+r*0.74} ${c+r*0.74},${c+r} ${c},${c+r} C${c-r*0.74},${c+r} ${c-r},${c+r*0.74} ${c-r},${c} C${c-r},${c-r*0.74} ${c-r*0.74},${c-r} ${c},${c-r} Z`);
},50);

// THINKING STATUS MESSAGES
let thinkTimer=null;
function startThinking(){
  orbPath.setAttribute('d',P_THINK);
  orbDots.classList.add('show');
  const msgs=['Researching cadastral records...','Pulling zoning data...','Analyzing market position...','Building buyer personas...','Writing objection handlers...','Crafting MLS description...','Assembling farming strategy...','Generating email campaigns...','Finalizing executive summary...'];
  let i=0;statusLine.textContent=msgs[0];
  thinkTimer=setInterval(()=>{i=(i+1)%msgs.length;statusLine.textContent=msgs[i];},4500);
}
function stopThinking(){
  clearInterval(thinkTimer);
  orbPath.setAttribute('d',P_HOME);
  orbDots.classList.remove('show');
}

// SUBMIT
function submitAddress(){
  const addr=addrInput.value.trim();
  if(!addr){addrInput.focus();toast('Please enter a property address');return;}
  currentAddress=addr;
  runBrief(addr);
}

// PROMPT
function buildPrompt(address){
  return `You are ELA — the Elite Listing Application — the most advanced real estate intelligence system ever built for a single agent. You serve exclusively Mr. Cribbes, a top-producing Montana real estate professional operating in one of the most competitive and sophisticated markets in the American West.

You are simultaneously:
1. A Montana real estate data analyst with encyclopedic knowledge of Gallatin County zoning codes, cadastral systems, tax assessment methodology, and development regulations
2. A top-producing Bozeman listing agent who has closed hundreds of transactions and knows exactly what wins listings and generates multiple offers
3. An elite copywriter who crafts marketing that makes buyers feel before they think
4. A demographic analyst who can profile a neighborhood's buyer pool from zip code data alone
5. A digital marketing strategist who knows exactly which platforms, hooks, and content formats convert in this market

CRITICAL INSTRUCTIONS:
- Write with absolute authority and confidence. Never say "I cannot access" or "I don't have real-time data" — use your deep knowledge of Montana real estate to deliver specific, actionable intelligence.
- Every section must be LONG, DETAILED, and SPECIFIC. Minimum 300 words per section.
- Write as if this brief will be handed directly to a seller at a listing appointment. It must be impressive enough to win the listing on the spot.
- Use specific Montana knowledge: Gallatin County mill levies (~450-500 mills for city, ~350-400 for county), Bozeman zoning codes (R-1 through B-3, REMU, PLI), typical Bozeman market metrics.
- Reference these sources by name: Montana Cadastral (svc.mt.gov/msl/cadastral), Bozeman GIS Planning Viewer (gisweb.bozeman.net/Html5Viewer/?viewer=planning), Montana DNRC Water Rights (gis.dnrc.mt.gov/apps/WRQS), Montana DOR (mtrevenue.gov/property)
- This brief should take 10-15 minutes to read. That is the standard.

PROPERTY ADDRESS: ${address}

WRITE ALL OF THESE SECTIONS IN FULL:

▸ CADASTRAL & OWNERSHIP ANALYSIS
Using your knowledge of Montana Cadastral records and Gallatin County assessment methodology: Identify the likely parcel ID format, estimated assessed market value vs. typical list prices in this area, ownership implications, estimated annual property taxes using Gallatin County mill levy rates, deed restriction patterns common to this subdivision or area, red flags an agent should investigate before listing, and what a buyer's attorney should review in the title commitment. Reference: svc.mt.gov/msl/cadastral

▸ ZONING & DEVELOPMENT POTENTIAL
Using your deep knowledge of Bozeman Municipal Code and Gallatin County zoning: Identify the most likely zoning designation and explain what it means for a buyer. List ALL permitted uses by-right and conditional uses requiring a CUP. Full ADU analysis under BMC 38.360.040. STR regulations and revenue potential. Development potential including subdivision possibilities. Setbacks, height limits, lot coverage. Any overlay districts. Growth Policy designation. Highest and best use conclusion. Reference: gisweb.bozeman.net/Html5Viewer/?viewer=planning

▸ TAX & FINANCIAL ANALYSIS
Estimate taxable value, annual taxes broken down by county/city/school/special districts. Identify likely SID or LID assessments common in this area. Compare effective tax rate to Bozeman market average. Tax trajectory analysis given Gallatin County appreciation rates. Tax advantage strategies for this buyer type. Reference: mtrevenue.gov/property

▸ FLOOD, HAZARD & ENVIRONMENTAL
FEMA flood zone analysis. Wildfire WUI designation. Montana radon risk. Water rights analysis using DNRC system (gis.dnrc.mt.gov/apps/WRQS). Soil and geologic considerations. Environmental history. How to present these factors to buyers.

▸ PERMIT HISTORY & COMPLIANCE
What permits should exist for this property type and age. Red flags suggesting unpermitted work. Bozeman Building Division records to pull. How to advise seller on proactive permit resolution. Impact on financing. Cost estimates for common permit issues.

▸ MARKET POSITION & COMPETITIVE ANALYSIS
Bozeman market overview: inventory levels, DOM trends, list-to-sale ratios, price per SF benchmarks, seasonal patterns. Competitive positioning framework: price per SF this property should command and why, top 3 value drivers, top 3 value detractors, pricing strategy recommendation. Absorption analysis. How to differentiate from competition.

▸ NEIGHBORHOOD DEMOGRAPHIC INTELLIGENCE
Population profile: median income, age distribution, education, household composition, owner vs renter rate. Economic profile: top employers, remote worker percentage, entrepreneurial percentage. Migration patterns: where buyers are coming from, what they're seeking, how long residents stay. Cultural and lifestyle profile. What this means for marketing strategy.

▸ IDEAL BUYER PROFILES — DEEP PSYCHOLOGICAL ANALYSIS
Top 3 buyer personas. For each: persona name and archetype, demographics, origin, financial profile, what they value most (specific to this property), biggest fears, decision trigger, media and information diet, messaging that resonates, how to reach them, conversion probability ranking, negotiation profile.

▸ LIFESTYLE ANALYSIS — THE FULL MONTANA EXPERIENCE
Morning ritual: specific coffee spots, workout options, sunrise description. Weekday life: realistic commute times to downtown Bozeman/MSU/Bozeman Health/Bridger Bowl/Belgrade/Livingston, work-from-home quality, after-work routine. Weekend warrior: specific summer hikes with names and drive times, fishing holes on Madison/Gallatin/Yellowstone rivers, winter skiing at Bridger Bowl and Big Sky, spring/fall activities. Community character: neighbor culture, dog friendliness, kids culture. Hidden gem angle. Honest seasonal reality check for all four seasons.

▸ SCHOOLS & FAMILY INFRASTRUCTURE
Assigned elementary/middle/high school with context on Bozeman School District quality. Specific programs: AP, dual enrollment with MSU, arts, athletics. Private and alternative options. MSU proximity and value. Childcare reality in Bozeman (be honest about shortage). Family infrastructure. How to use schools as a marketing asset.

▸ LOCATION INTELLIGENCE
Realistic walk score assessment. Drive time matrix: downtown Bozeman, BZN airport, MSU, Bridger Bowl, Big Sky, Costco/major grocery, Bozeman Health, Belgrade, Livingston, Yellowstone North Entrance. Essential services within 5 minutes. Dining and entertainment within 15 minutes with specific Bozeman restaurant and bar names. Negative proximity factors to address proactively.

▸ HONEST CONS ANALYSIS
Every realistic negative organized by category: property-specific, location, market, neighborhood, Montana-specific, financial. For each: likelihood a buyer raises it (High/Medium/Low) and deal-impact (Deal-killer/Negotiating chip/Minor concern).

▸ OBJECTION HANDLER PLAYBOOK
For every con: OBJECTION (exact words), UNDERLYING FEAR, ACKNOWLEDGE, REFRAME (with data), REDIRECT, CLOSE FORWARD, LEAVE-BEHIND DATA. Write as actual scripts Mr. Cribbes can memorize and deliver naturally.

▸ LISTING HEADLINE ARSENAL
12 distinct headlines organized by angle: 3 lifestyle, 2 investment/value, 2 aspiration, 2 urgency, 2 feature-specific, 1 community. Each with platform recommendation and target persona.

▸ LISTING COPY SUITE
Full MLS description (300-350 words): opening hook, property highlights, location/lifestyle paragraph, practical details, investment/value paragraph if applicable, closing CTA. Social media caption (150 words, no emojis, luxury brand). Text message version (50 words). Voicemail script (30 seconds).

▸ EMAIL CAMPAIGN — 3-PART SEQUENCE
Email 1 THE DISCOVERY (launch day): 5 subject options, preview text, full body 250-350 words, P.S. line.
Email 2 THE DEEP DIVE (days 4-5): 5 subject options, preview text, full body 200-300 words, P.S. line.
Email 3 THE LAST CALL (48 hours before deadline): 5 subject options, preview text, full body 150-200 words, P.S. line.

▸ SOCIAL MEDIA CONTENT MACHINE

// RUN BRIEF
async function runBrief(address){
  const bp=document.getElementById('brief-panel');
  document.getElementById('bp-addr').textContent=address;
  document.getElementById('brief-text').textContent='';
  currentBrief='';
  bp.style.display='flex';
  setTimeout(()=>bp.classList.add('open'),10);
  const streamBar=document.getElementById('stream-bar');
  const bpDot=document.getElementById('bp-dot');
  const bpStatus=document.getElementById('bp-status');
  streamBar.classList.add('on');
  bpDot.classList.add('pulse');
  bpStatus.textContent='Generating brief...';
  runBtn.disabled=true;
  startThinking();
  statusLine.textContent='Researching '+address+'...';

  try{
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:8000,
        messages:[{role:'user',content:buildPrompt(address)}]
      })
    });
    const rawText=await res.text();
    if(!res.ok){
      let msg=`Server error ${res.status}`;
      try{msg=JSON.parse(rawText).error?.message||msg;}catch(e){}
      throw new Error(msg);
    }
    let data;
    try{data=JSON.parse(rawText);}catch(e){throw new Error('Could not parse response');}
    let text='';
    if(Array.isArray(data.content)){for(const b of data.content){if(b.type==='text')text+=b.text;}}
    if(!text)throw new Error('Empty response from API');
    currentBrief=text;
    document.getElementById('brief-text').textContent=text;
    document.getElementById('brief-scroll').scrollTop=0;
    streamBar.classList.remove('on');
    bpDot.classList.remove('pulse');
    bpStatus.textContent='Complete · '+text.length.toLocaleString()+' characters · '+address;
    stopThinking();
    statusLine.textContent='Brief complete — enter another address to run again';
    toast('Brief complete — tap Download PDF');
  }catch(err){
    streamBar.classList.remove('on');
    bpDot.classList.remove('pulse');
    bpStatus.textContent='Error — please try again';
    stopThinking();
    orbPath.setAttribute('d',P_CIRCLE);
    statusLine.textContent='Enter a property address below';
    bp.classList.remove('open');
    setTimeout(()=>bp.style.display='none',500);
    toast('Error: '+err.message,5000);
  }finally{
    runBtn.disabled=false;
  }
}

function closeBrief(){
  const bp=document.getElementById('brief-panel');
  bp.classList.remove('open');
  setTimeout(()=>bp.style.display='none',500);
  orbPath.setAttribute('d',P_CIRCLE);
  statusLine.textContent='Enter a property address below';
}

}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseSections(text){
  const lines=text.split('\n');
  const sections=[];
  let current=null;
  for(const line of lines){
    const match=line.match(/^▸\s+(.+)$/);
    if(match){
      if(current)sections.push(current);
      const title=match[1].trim();
      current={title,body:'',isExec:title.toUpperCase().includes('EXECUTIVE')};
    }else if(current){
      current.body+=(current.body?'\n':'')+line;
    }
  }
  if(current)sections.push(current);
  if(sections.length===0)sections.push({title:'Intelligence Brief',body:text,isExec:false});
  sections.forEach(s=>s.body=s.body.trim());
  return sections;
}
