
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ELA — Elite Listing Application</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;0,600;1,200;1,300;1,400;1,600&family=Jost:wght@200;300;400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --black:#070707;
  --red:#8b0000;
  --red2:#5a0000;
  --red3:#c0392b;
  --white:#faf8f4;
  --gold:rgba(201,168,76,0.5);
}
html,body{width:100%;height:100%;background:var(--black);color:var(--white);font-family:'Cormorant Garamond',serif;overflow:hidden;}

/* ── BACKGROUND ── */
.bg-grid{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(139,0,0,0.032) 1px,transparent 1px),linear-gradient(90deg,rgba(139,0,0,0.032) 1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
}
.bg-vignette{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 65% 65% at 50% 50%,transparent 30%,rgba(7,7,7,0.7) 100%);}
.scan{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,0,0,0.1),transparent);z-index:1;animation:scanDown 7s linear infinite;}
@keyframes scanDown{0%{top:-1px;}100%{top:100%;}}

/* ── CORNERS ── */
.corner{position:fixed;z-index:10;width:38px;height:38px;}
.corner.tl{top:20px;left:20px;border-top:1px solid rgba(139,0,0,0.25);border-left:1px solid rgba(139,0,0,0.25);}
.corner.tr{top:20px;right:20px;border-top:1px solid rgba(139,0,0,0.25);border-right:1px solid rgba(139,0,0,0.25);}
.corner.bl{bottom:20px;left:20px;border-bottom:1px solid rgba(139,0,0,0.25);border-left:1px solid rgba(139,0,0,0.25);}
.corner.br{bottom:20px;right:20px;border-bottom:1px solid rgba(139,0,0,0.25);border-right:1px solid rgba(139,0,0,0.25);}

/* ── TOP BAR ── */
.top-bar{position:fixed;top:0;left:0;right:0;padding:22px 48px;display:flex;align-items:center;justify-content:space-between;z-index:20;border-bottom:1px solid rgba(139,0,0,0.07);background:linear-gradient(180deg,rgba(7,7,7,0.95) 0%,transparent 100%);}
.ela-mark{display:flex;flex-direction:column;gap:3px;}
.ela-letters{font-family:'Jost',sans-serif;font-size:11px;font-weight:300;letter-spacing:0.46em;color:rgba(139,0,0,0.8);text-transform:uppercase;}
.ela-sub{font-size:11px;font-style:italic;font-weight:200;color:rgba(250,248,244,0.22);letter-spacing:0.06em;}
.top-ev{font-family:'Jost',sans-serif;font-size:9px;font-weight:200;letter-spacing:0.32em;text-transform:uppercase;color:rgba(250,248,244,0.18);}

/* ── MAIN ── */
#main{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* ── ELA ORB ── */
.orb-wrap{position:relative;width:240px;height:240px;margin-bottom:44px;}
.orb-ring1{position:absolute;inset:-20px;border-radius:50%;border:.5px solid rgba(139,0,0,0.18);animation:spin1 15s linear infinite;}
.orb-ring1::after{content:'';position:absolute;width:5px;height:5px;background:var(--red);border-radius:50%;top:50%;right:-2.5px;transform:translateY(-50%);box-shadow:0 0 10px var(--red),0 0 20px rgba(139,0,0,0.35);}
.orb-ring2{position:absolute;inset:-36px;border-radius:50%;border:.5px solid rgba(139,0,0,0.07);animation:spin2 28s linear infinite;}
.orb-ring2::before{content:'';position:absolute;width:3px;height:3px;background:rgba(139,0,0,0.45);border-radius:50%;bottom:0;left:50%;transform:translateX(-50%);}
@keyframes spin1{to{transform:rotate(360deg);}}
@keyframes spin2{to{transform:rotate(-360deg);}}
.orb-canvas-clip{position:absolute;inset:0;border-radius:50%;overflow:hidden;}
canvas#elaOrb{display:block;width:240px;height:240px;}

/* ── HOME LABEL ── */
.home-label{
  font-family:'Jost',sans-serif;font-weight:200;font-size:9px;
  letter-spacing:0.32em;color:rgba(139,0,0,0.55);text-transform:uppercase;
  text-align:center;min-height:14px;margin-top:-28px;margin-bottom:16px;
  transition:opacity 0.5s;
}

/* ── STATUS ── */
#status-area{text-align:center;margin-bottom:28px;}
#greeting{font-size:28px;font-weight:200;font-style:italic;color:rgba(250,248,244,0.88);letter-spacing:0.03em;margin-bottom:8px;
  opacity:0;transform:translateY(8px);transition:opacity 1.8s ease 0.5s,transform 1.8s ease 0.5s;}
#greeting.show{opacity:1;transform:translateY(0);}
#status-line{font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:0.18em;text-transform:uppercase;color:rgba(250,248,244,0.28);transition:all 0.5s;}

/* ── DOTS ── */
.dots{display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.dots.show{display:flex;}
.dot{width:3px;height:3px;border-radius:50%;background:var(--red);animation:dp 1.6s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.32s;}.dot:nth-child(3){animation-delay:.64s;}
@keyframes dp{0%,100%{opacity:.15;transform:scale(.7);}50%{opacity:1;transform:scale(1.4);}}

/* ── ADDRESS INPUT ── */
#address-form{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:520px;padding:0 24px;}
#address-input{
  width:100%;background:rgba(139,0,0,0.04);
  border:1px solid rgba(139,0,0,0.22);
  color:var(--white);font-family:'Cormorant Garamond',serif;
  font-size:18px;font-style:italic;padding:15px 20px;outline:none;
  text-align:center;letter-spacing:0.02em;
  transition:border-color 0.25s,background 0.25s;-webkit-appearance:none;
}
#address-input:focus{border-color:var(--red);background:rgba(139,0,0,0.07);}
#address-input::placeholder{color:rgba(250,248,244,0.18);}
#run-btn{
  font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;
  background:transparent;border:1px solid rgba(139,0,0,0.5);color:rgba(139,0,0,0.8);
  padding:12px 44px;cursor:pointer;transition:all 0.25s;
}
#run-btn:hover{background:var(--red);color:var(--white);border-color:var(--red);}
#run-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* ── PROGRESS ── */
.prog-track{width:240px;height:1px;background:rgba(255,255,255,0.04);margin:18px auto 0;display:none;}
.prog-fill{height:100%;background:linear-gradient(90deg,transparent,var(--red) 80%,var(--red3));width:0%;transition:width .7s ease;position:relative;}
.prog-fill::after{content:'';position:absolute;right:0;top:-2.5px;width:5px;height:6px;background:var(--red);border-radius:1px;box-shadow:0 0 8px rgba(139,0,0,.8);}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(7,7,7,0.96);border:1px solid rgba(139,0,0,0.2);padding:10px 22px;font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:0.12em;text-transform:uppercase;color:rgba(139,0,0,0.8);z-index:100;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;}
#toast.show{opacity:1;}

/* ── BRIEF PANEL ── */
#brief-panel{position:fixed;inset:0;z-index:60;background:rgba(7,7,7,0.99);display:none;flex-direction:column;opacity:0;transition:opacity 0.5s;}
#brief-panel.open{display:flex;opacity:1;}
.bp-top{background:linear-gradient(135deg,#080505,#0e0606);border-bottom:1px solid rgba(139,0,0,0.12);padding:22px 44px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.bp-ela{font-family:'Jost',sans-serif;font-size:8px;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;color:rgba(139,0,0,0.7);margin-bottom:6px;}
.bp-addr{font-size:22px;font-weight:200;font-style:italic;color:var(--white);}
.bp-acts{display:flex;gap:10px;}
.bp-btn{font-family:'Jost',sans-serif;font-size:9px;font-weight:300;letter-spacing:0.14em;text-transform:uppercase;background:transparent;cursor:pointer;padding:8px 18px;transition:all 0.2s;}
.bp-btn.g{border:1px solid rgba(139,0,0,0.45);color:rgba(139,0,0,0.8);}
.bp-btn.g:hover{background:var(--red);color:var(--white);border-color:var(--red);}
.bp-btn.o{border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);}
.bp-btn.o:hover{border-color:rgba(139,0,0,0.4);color:rgba(139,0,0,0.7);}
.stream-bar{height:2px;display:none;background:linear-gradient(90deg,transparent,var(--red),var(--red3),var(--red),transparent);background-size:300%;animation:sFlow 2s infinite;flex-shrink:0;}
.stream-bar.on{display:block;}
@keyframes sFlow{0%{background-position:0%;}100%{background-position:300%;}}
#brief-scroll{flex:1;overflow-y:auto;padding:48px 56px;scrollbar-width:thin;scrollbar-color:rgba(139,0,0,0.3) transparent;}
#brief-text{font-size:15px;line-height:2;color:rgba(250,248,244,0.8);white-space:pre-wrap;word-break:break-word;max-width:860px;margin:0 auto;}
.bp-bottom{border-top:1px solid rgba(139,0,0,0.08);padding:10px 44px;display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(7,7,7,0.8);}
.bp-dot{width:4px;height:4px;border-radius:50%;background:var(--red);flex-shrink:0;}
.bp-dot.pulse{animation:dp 1.5s ease-in-out infinite;}
.bp-status{font-family:'Jost',sans-serif;font-size:9px;font-weight:300;letter-spacing:0.14em;text-transform:uppercase;color:rgba(250,248,244,0.25);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-vignette"></div>
<div class="scan"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div class="top-bar">
  <div class="ela-mark">
    <div class="ela-letters">E · L · A</div>
    <div class="ela-sub">Elite Listing Application</div>
  </div>
  <div class="top-ev">Engel &amp; Völkers · Bozeman</div>
</div>

<div id="main">
  <div class="orb-wrap">
    <div class="orb-ring2"></div>
    <div class="orb-ring1"></div>
    <div class="orb-canvas-clip">
      <canvas id="elaOrb" width="240" height="240"></canvas>
    </div>
  </div>

  <div class="home-label" id="homeLabel"></div>

  <div id="status-area">
    <div id="greeting"></div>
    <div class="dots" id="thinkDots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div id="status-line">Enter a property address below</div>
  </div>

  <div id="address-form">
    <input type="text" id="address-input" placeholder="123 Bridger Canyon Rd, Bozeman, MT" autocomplete="off"
      onkeydown="if(event.key==='Enter')submitAddress()"/>
    <button id="run-btn" onclick="submitAddress()">Generate Brief</button>
    <div class="prog-track" id="progTrack"><div class="prog-fill" id="progFill"></div></div>
  </div>
</div>

<div id="toast"></div>

<!-- BRIEF PANEL -->
<div id="brief-panel">
  <div class="bp-top">
    <div>
      <div class="bp-ela">ELA · Elite Listing Application · Mr. Cribbes</div>
      <div class="bp-addr" id="bp-addr">Intelligence Brief</div>
    </div>
    <div class="bp-acts">
      <button class="bp-btn g" onclick="downloadPDF()">Download PDF</button>
      <button class="bp-btn g" onclick="newBrief()">+ New Brief</button>
      <button class="bp-btn o" onclick="closeBrief()">Close</button>
    </div>
  </div>
  <div class="stream-bar" id="stream-bar"></div>
  <div id="brief-scroll"><div id="brief-text"></div></div>
  <div class="bp-bottom">
    <div class="bp-dot" id="bp-dot"></div>
    <div class="bp-status" id="bp-status">Ready</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// ELA ORB — canvas renderer
// ─────────────────────────────────────────────
const cv = document.getElementById('elaOrb');
const ctx = cv.getContext('2d');
const S = 240, H2 = S/2;

const C_RED='#8b0000', C_RED2='#5a0000', C_RED3='#c0392b';
const PAD = 12, PS = S - PAD*2;

const HOMES = [
  { name:'Montana Ranch', shapes:[
    {t:'poly',pts:[[.12,.92],[.12,.50],[.50,.14],[.88,.50],[.88,.92]],f:'#130000',s:C_RED},
    {t:'rect',x:.42,y:.70,w:.16,h:.22,f:'#090000',s:C_RED},
    {t:'rect',x:.20,y:.58,w:.14,h:.17,f:'#0d0000',s:C_RED2},
    {t:'rect',x:.66,y:.58,w:.14,h:.17,f:'#0d0000',s:C_RED2},
    {t:'poly',pts:[[.74,.92],[.74,.60],[.94,.60],[.94,.76],[.94,.92]],f:'#0e0000',s:C_RED2},
    {t:'rect',x:.60,y:.07,w:.07,h:.16,f:'#130000',s:C_RED2},
    {t:'line',pts:[[.50,.14],[.50,.36]],s:C_RED3},
    {t:'line',pts:[[.05,.92],[.95,.92]],s:C_RED},
    {t:'line',pts:[[.05,.92],[.05,.83]],s:C_RED2},
  ]},
  { name:'Modern Pavilion', shapes:[
    {t:'rect',x:.07,y:.44,w:.86,h:.48,f:'#0d0000',s:C_RED},
    {t:'rect',x:.07,y:.36,w:.86,h:.08,f:'#180000',s:C_RED},
    {t:'rect',x:.14,y:.26,w:.72,h:.10,f:'#150000',s:C_RED2},
    {t:'rect',x:.11,y:.49,w:.19,h:.27,f:'#0a0000',s:C_RED2},
    {t:'rect',x:.34,y:.49,w:.19,h:.27,f:'#0a0000',s:C_RED2},
    {t:'rect',x:.57,y:.49,w:.19,h:.27,f:'#0a0000',s:C_RED2},
    {t:'rect',x:.41,y:.62,w:.18,h:.30,f:'#070000',s:C_RED},
    {t:'line',pts:[[.07,.44],[.93,.44]],s:C_RED3},
    {t:'line',pts:[[.05,.92],[.95,.92]],s:C_RED},
  ]},
  { name:'Craftsman Bungalow', shapes:[
    {t:'poly',pts:[[.07,.58],[.50,.17],[.93,.58]],f:'#180000',s:C_RED},
    {t:'poly',pts:[[.03,.65],[.50,.40],[.97,.65]],f:'#110000',s:C_RED2},
    {t:'rect',x:.09,y:.58,w:.82,h:.34,f:'#0e0000',s:C_RED},
    {t:'rect',x:.19,y:.67,w:.13,h:.15,f:'#090000',s:C_RED2},
    {t:'rect',x:.68,y:.67,w:.13,h:.15,f:'#090000',s:C_RED2},
    {t:'rect',x:.42,y:.71,w:.16,h:.21,f:'#070000',s:C_RED},
    {t:'line',pts:[[.17,.65],[.17,.92]],s:C_RED2},
    {t:'line',pts:[[.35,.65],[.35,.92]],s:C_RED2},
    {t:'line',pts:[[.65,.65],[.65,.92]],s:C_RED2},
    {t:'line',pts:[[.83,.65],[.83,.92]],s:C_RED2},
    {t:'rect',x:.55,y:.09,w:.08,h:.20,f:'#180000',s:C_RED2},
    {t:'line',pts:[[.05,.92],[.95,.92]],s:C_RED},
  ]},
  { name:'Luxury Timber Frame', shapes:[
    {t:'poly',pts:[[.15,.92],[.15,.46],[.50,.09],[.85,.46],[.85,.92]],f:'#180000',s:C_RED},
    {t:'poly',pts:[[.03,.70],[.28,.46],[.50,.70]],f:'#110000',s:C_RED2},
    {t:'poly',pts:[[.50,.70],[.72,.46],[.97,.70]],f:'#110000',s:C_RED2},
    {t:'rect',x:.19,y:.57,w:.62,h:.35,f:'#0d0000',s:C_RED2},
    {t:'rect',x:.34,y:.48,w:.32,h:.30,f:'#0a0000',s:C_RED},
    {t:'line',pts:[[.34,.48],[.66,.78]],s:C_RED2},
    {t:'line',pts:[[.66,.48],[.34,.78]],s:C_RED2},
    {t:'rect',x:.42,y:.74,w:.16,h:.18,f:'#070000',s:C_RED},
    {t:'line',pts:[[.15,.46],[.85,.46]],s:C_RED2},
    {t:'line',pts:[[.03,.70],[.97,.70]],s:C_RED2},
    {t:'line',pts:[[.50,.09],[.50,.24]],s:C_RED3},
    {t:'line',pts:[[.05,.92],[.95,.92]],s:C_RED},
  ]}
];

// orb state
let phi=0, pulse=0, irisScale=1;
let morphT=0, phase='orb'; // orb | out | hold | in
let homeIdx=0;
let elaRaf=null, lastTs=0;

function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function px(n){return PAD+n*PS;}

function drawShape(sh, a){
  if(a<=0) return;
  ctx.save(); ctx.globalAlpha=a;
  if(sh.t==='poly'){
    ctx.beginPath();
    ctx.moveTo(px(sh.pts[0][0]),px(sh.pts[0][1]));
    sh.pts.slice(1).forEach(p=>ctx.lineTo(px(p[0]),px(p[1])));
    ctx.closePath();
    if(sh.f){ctx.fillStyle=sh.f;ctx.fill();}
    if(sh.s){ctx.strokeStyle=sh.s;ctx.lineWidth=.85;ctx.stroke();}
  } else if(sh.t==='rect'){
    if(sh.f){ctx.fillStyle=sh.f;ctx.fillRect(px(sh.x),px(sh.y),sh.w*PS,sh.h*PS);}
    if(sh.s){ctx.strokeStyle=sh.s;ctx.lineWidth=.85;ctx.strokeRect(px(sh.x),px(sh.y),sh.w*PS,sh.h*PS);}
  } else if(sh.t==='line'){
    ctx.beginPath();
    ctx.moveTo(px(sh.pts[0][0]),px(sh.pts[0][1]));
    sh.pts.slice(1).forEach(p=>ctx.lineTo(px(p[0]),px(p[1])));
    ctx.strokeStyle=sh.s;ctx.lineWidth=.85;ctx.stroke();
  }
  ctx.restore();
}

function drawOrb(a){
  if(a<=0) return;
  ctx.save(); ctx.globalAlpha=a;

  // ambient glow
  const ag=ctx.createRadialGradient(H2,H2,50,H2,H2,130);
  ag.addColorStop(0,'rgba(0,0,0,0)');ag.addColorStop(.7,'rgba(139,0,0,0.05)');ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag;ctx.fillRect(0,0,S,S);

  // sphere
  const sg=ctx.createRadialGradient(H2-28,H2-28,6,H2,H2,115);
  sg.addColorStop(0,'#2c2c2c');sg.addColorStop(.38,'#161616');sg.addColorStop(1,'#040404');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(H2,H2,115,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.stroke();

  // surface rings
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=.5;
  [.3,.52,.74].forEach(r=>{ctx.beginPath();ctx.arc(H2,H2,115*r,0,Math.PI*2);ctx.stroke();});

  // iris outer rotating
  const iR=52*irisScale;
  ctx.save();ctx.translate(H2,H2);ctx.rotate(phi);
  const ig=ctx.createRadialGradient(0,0,iR*.3,0,0,iR);
  ig.addColorStop(0,'#2a0000');ig.addColorStop(.7,'#150000');ig.addColorStop(1,'#090000');
  ctx.fillStyle=ig;ctx.beginPath();ctx.arc(0,0,iR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(139,0,0,0.4)';ctx.lineWidth=.6;ctx.beginPath();ctx.arc(0,0,iR,0,Math.PI*2);ctx.stroke();
  for(let i=0;i<16;i++){
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(i*Math.PI/8)*iR,Math.sin(i*Math.PI/8)*iR);
    ctx.strokeStyle='rgba(139,0,0,0.18)';ctx.lineWidth=.45;ctx.stroke();
  }
  ctx.restore();

  // iris mid
  const mR=37*irisScale;
  const mg=ctx.createRadialGradient(H2-7,H2-7,2,H2,H2,mR);
  mg.addColorStop(0,'#9b1010');mg.addColorStop(.45,'#6a0000');mg.addColorStop(1,'#190000');
  ctx.fillStyle=mg;ctx.beginPath();ctx.arc(H2,H2,mR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(180,0,0,${.42+pulse*.3})`;ctx.lineWidth=.8;
  ctx.beginPath();ctx.arc(H2,H2,mR,0,Math.PI*2);ctx.stroke();

  // pupil
  ctx.fillStyle='#020202';ctx.beginPath();ctx.arc(H2,H2,18*irisScale,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.11)';ctx.beginPath();ctx.arc(H2-6,H2-6,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.04)';ctx.beginPath();ctx.arc(H2+5,H2+5,3,0,Math.PI*2);ctx.fill();

  // specular
  const sp=ctx.createRadialGradient(H2-36,H2-38,0,H2-22,H2-24,46);
  sp.addColorStop(0,'rgba(255,255,255,0.08)');sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sp;ctx.beginPath();ctx.arc(H2,H2,115,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

function drawHome(a, home){
  if(a<=0) return;
  ctx.save();ctx.globalAlpha=a;
  ctx.fillStyle=`rgba(4,0,0,${Math.min(1,a*1.15)})`;ctx.fillRect(0,0,S,S);
  const bg=ctx.createRadialGradient(H2,S*.9,5,H2,S*.9,110);
  bg.addColorStop(0,`rgba(139,0,0,${.16*a})`);bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,S,S);
  ctx.restore();
  home.shapes.forEach((sh,i)=>{
    const delay=i/home.shapes.length*.55;
    const sa=Math.max(0,Math.min(1,(a-delay)/.42));
    drawShape(sh,sa);
  });
}

function elaRender(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);
  lastTs=ts;
  phi+=dt*.38;
  pulse=(Math.sin(ts*.0018)+1)*.5;
  irisScale=1+Math.sin(ts*.0014)*.05;
  ctx.clearRect(0,0,S,S);
  if(phase==='orb'){
    drawOrb(1);
  } else if(phase==='out'){
    morphT=Math.min(1,morphT+dt*.52);
    const t=ease(morphT);
    drawHome(t,HOMES[homeIdx]);
    drawOrb(1-t);
    if(morphT>=1) phase='hold';
  } else if(phase==='hold'){
    drawHome(1,HOMES[homeIdx]);
  } else if(phase==='in'){
    morphT=Math.max(0,morphT-dt*.52);
    const t=ease(morphT);
    drawHome(t,HOMES[homeIdx]);
    drawOrb(1-t);
    if(morphT<=0) phase='orb';
  }
  elaRaf=requestAnimationFrame(elaRender);
}

let cycling=false, holdTimer=null, cycleStep=null;

function startHomeCycle(){
  if(cycling) return;
  cycling=true;
  homeIdx=0;
  runCycle();
}

function runCycle(){
  if(!cycling) return;
  // morph out to home
  phase='out'; morphT=0;
  document.getElementById('homeLabel').textContent=HOMES[homeIdx].name;
  // hold 5s then morph back
  holdTimer=setTimeout(()=>{
    if(!cycling) return;
    phase='in'; morphT=1;
    document.getElementById('homeLabel').textContent='';
    // after returning to orb, pause 2s then next home
    cycleStep=setTimeout(()=>{
      if(!cycling) return;
      homeIdx=(homeIdx+1)%HOMES.length;
      runCycle();
    },2200);
  },5200);
}

function stopHomeCycle(){
  cycling=false;
  clearTimeout(holdTimer);
  clearTimeout(cycleStep);
  // morph back to orb if mid-home
  if(phase==='hold'||phase==='out'){
    phase='in'; morphT=1;
  }
  document.getElementById('homeLabel').textContent='';
}

async function runBrief(address){
  const bp=document.getElementById('brief-panel');
  document.getElementById('bp-addr').textContent=address;
  document.getElementById('brief-text').textContent='';
  currentBrief='';
  bp.style.display='flex';
  setTimeout(()=>bp.classList.add('open'),10);
  const streamBar=document.getElementById('stream-bar');
  const bpDot=document.getElementById('bp-dot');
  const bpStatus=document.getElementById('bp-status');
  streamBar.classList.add('on');
  bpDot.classList.add('pulse');
  bpStatus.textContent='Generating brief...';
  document.getElementById('run-btn').disabled=true;
  startThinking(address);

  try{
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:8000,
        messages:[{role:'user',content:buildPrompt(address)}]
      })
    });
    const rawText=await res.text();
    if(!res.ok){
      let msg=`Server error ${res.status}`;
      try{msg=JSON.parse(rawText).error?.message||msg;}catch(e){}
      throw new Error(msg);
    }
    let data;
    try{data=JSON.parse(rawText);}catch(e){throw new Error('Could not parse response');}
    let text='';
    if(Array.isArray(data.content)){for(const b of data.content){if(b.type==='text')text+=b.text;}}
    if(!text) throw new Error('Empty response from API');
    currentBrief=text;
    document.getElementById('brief-text').textContent=text;
    document.getElementById('brief-scroll').scrollTop=0;
    streamBar.classList.remove('on');
    bpDot.classList.remove('pulse');
    bpStatus.textContent='Complete · '+text.length.toLocaleString()+' characters · '+address;
    stopThinking();
    document.getElementById('progFill').style.width='100%';
    setTimeout(()=>{
      document.getElementById('progTrack').style.display='none';
      document.getElementById('progFill').style.width='0%';
    },1200);
    document.getElementById('status-line').textContent='Brief complete — enter another address to run again';
    toast('Brief complete — tap Download PDF');
  }catch(err){
    streamBar.classList.remove('on');
    bpDot.classList.remove('pulse');
    bpStatus.textContent='Error — please try again';
    stopThinking();
    document.getElementById('progTrack').style.display='none';
    document.getElementById('progFill').style.width='0%';
    bp.classList.remove('open');
    setTimeout(()=>bp.style.display='none',500);
    toast('Error: '+err.message,5000);
  }finally{
    document.getElementById('run-btn').disabled=false;
  }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseSections(text){
  const lines=text.split('\n');
  const sections=[];
  let current=null;
  for(const line of lines){
    const match=line.match(/^▸\s+(.+)$/);
    if(match){
      if(current) sections.push(current);
      current={title:match[1].trim(),body:'',isExec:match[1].toUpperCase().includes('EXECUTIVE')};
    } else if(current){
      current.body+=(current.body?'\n':'')+line;
    }
  }
  if(current) sections.push(current);
  if(sections.length===0) sections.push({title:'Intelligence Brief',body:text,isExec:false});
  sections.forEach(s=>s.body=s.body.trim());
  return sections;
}

function formatBody(text){
  const lines=text.split('\n');
  let html='',inList=false;
  for(const line of lines){
    const trimmed=line.trim();
    const isBullet=trimmed.startsWith('- ')||trimmed.startsWith('• ')||trimmed.startsWith('* ');
    const isNum=/^\d+\.\s/.test(trimmed);
    const isEmpty=trimmed==='';
    const cleaned=trimmed.replace(/^#{1,4}\s*/,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
    if(isEmpty){
      if(inList){html+='</ul>';inList=false;}
      html+='<br/>';
    } else if(isBullet||isNum){
      if(!inList){html+='<ul>';inList=true;}
      html+=`<li>${cleaned.replace(/^[-•*]\s*/,'').replace(/^\d+\.\s*/,'')}</li>`;
    } else {
      if(inList){html+='</ul>';inList=false;}
      if(cleaned&&!cleaned.match(/^---+$/)) html+=`<p>${cleaned}</p>`;
    }
  }
  if(inList) html+='</ul>';
  return html;
}
